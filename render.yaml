services:
  - type: web
    name: recibos-com-assinatura
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: PORT
        value: 3333
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: recibos-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
