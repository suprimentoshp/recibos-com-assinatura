services:
  - type: web
    name: recibos-com-assinatura
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: PORT
        value: 3333
      - key: DATA_DIR
        value: /app/data
      - key: DATABASE_URL
        fromDatabase:
          name: recibos-postgres
          property: connectionString
    disk:
      name: recibos-data
      mountPath: /app/data
      sizeGB: 1

databases:
  - name: recibos-postgres
    databaseName: recibos_planalto
    user: recibos_planalto
    plan: starter
